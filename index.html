<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Youooo World</title>

  <link
    href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="header">
    <div class="header-left">
      <h1>
        YOUOOO WORLD
        <a
          href="https://www.linkedin.com/in/ahmedaldulaimi/"
          target="_blank"
          rel="noopener noreferrer"
          class="linkedin-link"
          title="Ahmed Aldulaimi LinkedIn"
        >🌍</a>
      </h1>
      <p>Global Monitoring Command Center</p>
    </div>

    <div class="header-right">
      <div id="market-tape">
  <span id="market-data">Loading market data...</span>
</div>
      <div class="status-box">STATUS: ONLINE</div>
      <div class="status-box">FEED: EARTHQUAKES</div>
    </div>
  </div>

  <div id="sidebar">
    <div class="sidebar-title">TACTICAL LAYERS</div>

    <label class="layer-item">
      <input type="checkbox" id="toggle-earthquakes" checked />
      <span>Earthquakes</span>
    </label>

    <label class="layer-item">
      <input type="checkbox" id="toggle-aircraft" />
      <span>Aircraft</span>
    </label>

    <label class="layer-item">
      <input type="checkbox" id="toggle-satellites" />
      <span>Satellites</span>
    </label>

    <label class="layer-item">
      <input type="checkbox" id="toggle-ships" />
      <span>Ships</span>
    </label>

    <label class="layer-item">
      <input type="checkbox" id="toggle-conflicts" />
      <span>Conflict Zones</span>
    </label>

    <label class="layer-item">
      <input type="checkbox" id="toggle-wildfires" />
      <span>Wildfires</span>
    </label>

    <div class="sidebar-note">
      Aircraft is the easiest live feed to add next.
      Satellites, ships, wildfires and conflicts may require APIs.
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="script.js"></script>
</body>
</html>
